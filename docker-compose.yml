version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tickets_postgres
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
      POSTGRES_DB: ticket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d ticket_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airport_network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: tickets_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - airport_network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: tickets_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - airport_network

  tickets:
    build: .
    container_name: tickets_service
    # hostPort: 8005, internalPort: 8000 (из документации)
    ports:
      - "8005:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: ticket_pass
      POSTGRES_DB: ticket_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - airport_network
    command: >
      sh -c "
        python scripts/wait_for_db.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

networks:
  airport_network:
    driver: bridge

volumes:
  postgres_data: